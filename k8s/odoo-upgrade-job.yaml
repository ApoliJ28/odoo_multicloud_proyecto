apiVersion: batch/v1
kind: Job
metadata:
  name: odoo-upgrade-job
spec:
  template:
    spec:
      containers:
      - name: upgrade
        image: REPLACE_IMAGE_TAG
        command: ["/bin/bash", "-c"]
        args: 
          - |
            /custom-entrypoint.sh odoo -d odoo_produccion -i web -u all --stop-after-init && \
            echo "Actualizando contraseña del usuario admin..." && \
            python3 <<'PYEOF'
            import os, psycopg2
            from passlib.context import CryptContext
            ctx = CryptContext(schemes=['pbkdf2_sha512', 'plaintext'], deprecated=['plaintext'])
            hashed = ctx.hash(os.environ['ADMIN_PASSWORD'])
            conn = psycopg2.connect(host=os.environ['DB_HOST'], user=os.environ['DB_USER'], password=os.environ['DB_PASSWORD'], dbname=os.environ['DB_NAME'])
            cur = conn.cursor()
            cur.execute("UPDATE res_users SET password=%s WHERE login='admin'", (hashed,))
            conn.commit()
            conn.close()
            print('Contraseña del admin actualizada exitosamente.')
            PYEOF
        env:
        - name: DB_HOST
          valueFrom: { secretKeyRef: { name: odoo-db-secrets, key: db_host } }
        - name: DB_USER
          valueFrom: { secretKeyRef: { name: odoo-db-secrets, key: db_user } }
        - name: DB_PASSWORD
          valueFrom: { secretKeyRef: { name: odoo-db-secrets, key: db_password } }
        - name: ADMIN_PASSWORD
          valueFrom: { secretKeyRef: { name: odoo-db-secrets, key: admin_password } }
        - name: DB_NAME
          valueFrom: { secretKeyRef: { name: odoo-db-secrets, key: db_name } }
      restartPolicy: OnFailure