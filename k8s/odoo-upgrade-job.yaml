apiVersion: batch/v1
kind: Job
metadata:
  name: odoo-upgrade-job
spec:
  template:
    spec:
      containers:
      - name: upgrade
        image: REPLACE_IMAGE_TAG
        command: ["odoo"]
        args: ["-d", "odoo_produccion", "-u", "all", "--stop-after-init"]
        env:
        - name: DB_HOST
          valueFrom: { secretKeyRef: { name: odoo-db-secrets, key: db_host } }
        - name: DB_USER
          valueFrom: { secretKeyRef: { name: odoo-db-secrets, key: db_user } }
        - name: DB_PASSWORD
          valueFrom: { secretKeyRef: { name: odoo-db-secrets, key: db_password } }
        - name: DB_NAME
          valueFrom: { secretKeyRef: { name: odoo-db-secrets, key: db_name } }
      restartPolicy: OnFailure