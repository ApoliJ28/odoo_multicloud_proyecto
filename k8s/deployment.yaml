apiVersion: apps/v1
kind: Deployment
metadata:
  name: odoo-deployment
  namespace: default
  labels:
    app: odoo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: odoo
  template:
    metadata:
      labels:
        app: odoo
    spec:
    # Init container para actualizar la base de datos
      initContainers:
      - name: odoo-init-db
        image: REPLACE_IMAGE_TAG
        command: ["/bin/bash", "-c"]
        args: 
          - |
            /custom-entrypoint.sh odoo -u all --stop-after-init --no-http || /custom-entrypoint.sh odoo -i web --stop-after-init --no-http
        env:
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: odoo-db-secrets
              key: db_host
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: odoo-db-secrets
              key: db_user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: odoo-db-secrets
              key: db_password
        - name: ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: odoo-db-secrets
              key: admin_password
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: odoo-db-secrets
              key: db_name
      containers:
      - name: odoo-app
        # La imagen será reemplazada dinámicamente por Jenkins en cada despliegue
        # No se usa args: el initContainer ya inicializa la DB. Forzar -i base aquí causaría reinstalación en cada arranque.
        image: REPLACE_IMAGE_TAG 
        ports:
        - containerPort: 8069
        resources:
          requests:
            memory: "768Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        # Readiness: El LoadBalancer NO envía tráfico hasta que Odoo responda en /web/login
        readinessProbe:
          httpGet:
            path: /web/health
            port: 8069
          initialDelaySeconds: 40
          periodSeconds: 10
          timeoutSeconds: 5
        # Liveness: Si Odoo deja de responder, Kubernetes reinicia el contenedor
        livenessProbe:
          httpGet:
            path: /web/health
            port: 8069
          initialDelaySeconds: 120
          periodSeconds: 30
          timeoutSeconds: 10
        env:
        # Extraemos las credenciales de un Secreto de K8s que será gestionado por el proveedor cloud
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: odoo-db-secrets
              key: db_host
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: odoo-db-secrets
              key: db_user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: odoo-db-secrets
              key: db_password
        - name: ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: odoo-db-secrets
              key: admin_password
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: odoo-db-secrets
              key: db_name