apiVersion: v1
kind: Service
metadata:
  name: odoo-service
  namespace: default
  labels:
    app: odoo
spec:
  type: LoadBalancer
  # Garantiza que todas las peticiones de un mismo cliente lleguen al mismo pod.
  # Esto evita errores de "Session Expired" cuando hay múltiples réplicas.
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600
  selector:
    app: odoo
  ports:
    - port: 80
      targetPort: 8069
      protocol: TCP