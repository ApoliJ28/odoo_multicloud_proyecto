---
- name: Aprovisionamiento del Orquestador Jenkins (Docker + Admin Auth)
  hosts: jenkins_server
  become: true # Ejecutar con privilegios de sudo

  # 1. se carga los secretos.
  vars_files:
    - secrets.yml

  tasks:
    # 2. Memoria Virtual
    - name: Crear y activar un archivo Swap de 2GB
      shell: |
        if [ ! -f /swapfile ]; then
          fallocate -l 2G /swapfile
          chmod 600 /swapfile
          mkswap /swapfile
          swapon /swapfile
          echo '/swapfile none swap sw 0 0' >> /etc/fstab
        fi

    # 3. Instalación de Docker y Docker Compose
    - name: Actualizar caché y paquetes básicos
      apt:
        name: [wget, curl, git, apt-transport-https, ca-certificates, software-properties-common]
        state: present
        update_cache: yes

    - name: Agregar clave GPG de Docker
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Agregar repositorio de Docker
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu jammy stable"
        state: present

    - name: Instalar Docker CE y Docker Compose Plugin
      apt:
        name: [docker-ce, docker-ce-cli, containerd.io, docker-compose-plugin]
        state: present
        update_cache: yes

    - name: Asegurar que Docker esté ejecutándose
      systemd:
        name: docker
        state: started
        enabled: yes

    # 4. Preparación de la estructura de directorios y script de Groovy para Jenkins
    - name: Crear estructura de directorios para Jenkins
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - /opt/jenkins-docker
        - /opt/jenkins-docker/jenkins_home
        - /opt/jenkins-docker/jenkins_home/init.groovy.d

    - name: Inyectar script de Groovy para crear usuario administrador
      copy:
        dest: /opt/jenkins-docker/jenkins_home/init.groovy.d/basic-security.groovy
        content: |
          import jenkins.model.*
          import hudson.security.*
          def instance = Jenkins.getInstance()
          def hudsonRealm = new HudsonPrivateSecurityRealm(false)
          // Aquí Ansible inyecta los valores de tu secrets.yml
          hudsonRealm.createAccount("{{ jenkins_admin_user }}", "{{ jenkins_admin_password }}")
          instance.setSecurityRealm(hudsonRealm)
          def strategy = new FullControlOnceLoggedInAuthorizationStrategy()
          strategy.setAllowAnonymousRead(false)
          instance.setAuthorizationStrategy(strategy)
          instance.save()

    # 5. Creación del archivo docker-compose.yml y levantamiento de Jenkins
    - name: Generar docker-compose.yml
      copy:
        dest: /opt/jenkins-docker/docker-compose.yml
        content: |
          version: '3.8'
          services:
            jenkins:
              image: jenkins/jenkins:lts
              container_name: jenkins-master
              user: root # Ejecuta como root para tener acceso al socket de Docker
              ports:
                - "8080:8080"
                - "50000:50000"
              environment:
                # Esto le dice a Jenkins que no muestre la pantalla inicial de instalación
                - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
              volumes:
                - ./jenkins_home:/var/jenkins_home
                - /var/run/docker.sock:/var/run/docker.sock # Permite a Jenkins interactuar con Docker
              restart: always

    - name: Levantar Jenkins con Docker Compose
      command: docker compose up -d
      args:
        chdir: /opt/jenkins-docker

    - name: Mostrar Instrucciones Finales
      debug:
        msg: 
          - "==================================================="
          - "✨ ORQUESTADOR JENKINS DESPLEGADO CON ÉXITO"
          - "🌐 Accede a: http://{{ inventory_hostname }}:8080"
          - "👤 Usuario: {{ jenkins_admin_user }}"
          - "==================================================="
  