---
- name: Aprovisionamiento del Orquestador Jenkins (Docker + Admin Auth + Multicloud Creds)
  hosts: jenkins_server
  become: true # Ejecutar con privilegios de sudo

  # 1. Carga de variables secretas (Credenciales de Jenkins, AWS y Azure)
  vars_files:
    - secrets.yml

  tasks:
    # 2. Memoria Swap (2GB) para la EC2
    # -----------------------------------------
    - name: Crear y activar un archivo Swap de 2GB
      shell: |
        if [ ! -f /swapfile ]; then
          fallocate -l 2G /swapfile
          chmod 600 /swapfile
          mkswap /swapfile
          swapon /swapfile
          echo '/swapfile none swap sw 0 0' >> /etc/fstab
        fi

    # 3. Instalación de Docker y Docker Compose
    # -----------------------------------------
    - name: Actualizar caché y paquetes básicos
      apt:
        name: [wget, curl, git, apt-transport-https, ca-certificates, software-properties-common]
        state: present
        update_cache: yes

    - name: Agregar clave GPG de Docker
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Agregar repositorio de Docker
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu jammy stable"
        state: present

    - name: Instalar Docker CE y Docker Compose Plugin
      apt:
        name: [docker-ce, docker-ce-cli, containerd.io, docker-compose-plugin]
        state: present
        update_cache: yes

    - name: Asegurar que Docker esté ejecutándose
      systemd:
        name: docker
        state: started
        enabled: yes

    # 4. Preparar estructura de directorios y archivos para Jenkins
    # -----------------------------------------
    - name: Crear estructura de directorios para Jenkins en la EC2
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - /opt/jenkins-docker
        - /opt/jenkins-docker/jenkins_home
        - /opt/jenkins-docker/jenkins_home/init.groovy.d

    - name: Copiar archivos estáticos (Dockerfile y plugins.txt)
      copy:
        src: "./templates/{{ item }}"
        dest: "/opt/jenkins-docker/{{ item }}"
      loop:
        - Dockerfile
        - plugins.txt

    - name: Generar docker-compose.yml desde tu plantilla Jinja2
      template:
        src: "./templates/docker-compose.yml.j2"
        dest: "/opt/jenkins-docker/docker-compose.yml"

    - name: Inyectar plantilla de Seguridad Básica (Usuario Admin)
      template:
        src: "./templates/init.groovy.d/1_basic-security.groovy.j2"
        dest: "/opt/jenkins-docker/jenkins_home/init.groovy.d/1_basic-security.groovy"
        mode: '0644'

    - name: Inyectar plantilla de Credenciales Multicloud (AWS + Azure)
      template:
        src: "./templates/init.groovy.d/2_credentials.groovy.j2"
        dest: "/opt/jenkins-docker/jenkins_home/init.groovy.d/2_credentials.groovy"
        mode: '0644'
    
    - name: Inyectar plantilla de Conexión a GitHub y Creación de Job
      template:
        src: "./templates/init.groovy.d/3_pipeline-job.groovy.j2"
        dest: "/opt/jenkins-docker/jenkins_home/init.groovy.d/3_pipeline-job.groovy"
        mode: '0644'

    # 5. Desplegar Jenkins con Docker Compose
    # -----------------------------------------
    - name: Construir imagen y levantar Jenkins con Docker Compose
      command: docker compose up -d --build
      args:
        chdir: /opt/jenkins-docker

    - name: Mostrar Instrucciones Finales
      debug:
        msg: 
          - "==================================================="
          - "✨ ORQUESTADOR JENKINS DESPLEGADO CON ÉXITO"
          - "🌐 Accede a: http://{{ inventory_hostname }}:8080"
          - "👤 Usuario: {{ jenkins_admin_user }}"
          - "🔑 Contraseña: (La configurada en secrets.yml)"
          - "☁️  Credenciales 'aws-credentials-id' y 'azure-credentials-id' inyectadas."
          - "==================================================="
    